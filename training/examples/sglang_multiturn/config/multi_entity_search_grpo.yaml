hydra:
  searchpath:
    - file://verl/trainer/config

defaults:
  - ppo_trainer
  - _self_

data:
  max_prompt_length: 4096
  max_response_length: 10000
  train_batch_size: 512
  val_batch_size: 256
  return_raw_chat: True
  shuffle: False

actor_rollout_ref:
  hybrid_engine: True
  rollout:
    name: sglang_async
    multi_turn:
      enable: True
      format: hermes  # or qwen, depending on your model
      tool_config_path: examples/sglang_multiturn/config/tool_config/multi_entity_search_tool_config.yaml
      terminate_on_answer: True
      max_assistant_turns: 10
      max_tool_response_length: 10000
      tool_response_truncate_side: left

trainer:
  project_name: 'multi_entity_search_rl'
  experiment_name: 'multi_entity_search_training'
  logger: ['console', 'wandb']
  n_gpus_per_node: 8
  nnodes: 1
  save_freq: 25
  test_freq: 50
  total_epochs: 10
