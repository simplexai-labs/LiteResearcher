working_dir: .   # default to current working dir; override via env or CLI
# Exclude large dirs to speed up Ray job pkg upload
excludes:
  - "/.git/"
  - "/checkpoints/"
  - "/rollout_trajectory/"
  - "/validation_trajectory/"
  - "/data/"
  - "/examples/"
  - "/logs/"
  - "/logs_packing/"
  - "/logs_packing_new/"
  - "/logs_packing_resume/"
  - "/outputs/"
  - "/swanlog/"
  - "/wandb/"
  - "/log_browse/"
  - "/log_browse_sub/"
  - "/log_browse_sub_sub/"
  - "/debug_logs/"
  - "/.pytest_cache/"
  - "/__pycache__/"
  - "*.pyc"
  - "*.pyo"
  - ".pyd"
  - "/.coverage"
env_vars:
  TORCH_NCCL_AVOID_RECORD_STREAMS: "1"
  CUDA_DEVICE_MAX_CONNECTIONS: "1"
  HYDRA_FULL_ERROR: "1"
  CUDA_HOME: "/usr/local/cuda-12.6"
  WANDB_API_KEY: ""   # set in env / CLI; do not commit secrets
  WANDB_DIR: "./wandb"
  WANDB_CACHE_DIR: "./wandb/.cache"
