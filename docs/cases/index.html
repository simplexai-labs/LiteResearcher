<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LiteResearcher · Trajectory Cases</title>
<style>
  :root {
    --bg: #0f1217;
    --panel: #161a22;
    --panel-2: #1d222c;
    --border: #262c38;
    --text: #e6edf3;
    --muted: #8b96a8;
    --accent: #4f8cff;
    --think: #5b9eff;
    --search: #2bbf7c;
    --visit: #f0a23e;
    --tool: #8794ad;
    --answer: #c084fc;
    --good: #2bbf7c;
    --bad: #ef4444;
    --warn: #f0a23e;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--text);
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", "Segoe UI", system-ui, sans-serif; }
  a { color: var(--accent); }
  pre, code { font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; }
  pre { margin: 0; white-space: pre-wrap; word-break: break-word; }

  #app { display: grid; grid-template-columns: 280px 1fr; height: 100vh; }
  #sidebar { background: var(--panel); border-right: 1px solid var(--border); overflow-y: auto; padding: 12px; }
  #sidebar h1 { font-size: 14px; margin: 4px 0 10px; color: var(--muted); font-weight: 600; letter-spacing: .04em; text-transform: uppercase; }
  .bench { margin-bottom: 8px; }
  .bench-head { display: flex; align-items: center; justify-content: space-between;
    padding: 6px 8px; border-radius: 6px; cursor: pointer; user-select: none; color: var(--text); }
  .bench-head:hover { background: var(--panel-2); }
  .bench-head .count { color: var(--muted); font-size: 12px; }
  .cases { display: none; margin: 4px 0 0 8px; padding-left: 6px; border-left: 1px dashed var(--border); }
  .bench.open .cases { display: block; }
  .case-item { padding: 6px 8px; border-radius: 6px; cursor: pointer; font-size: 13px; color: var(--muted); line-height: 1.4; }
  .case-item:hover { background: var(--panel-2); color: var(--text); }
  .case-item.active { background: #243150; color: var(--text); }
  .case-item .case-meta { display: flex; gap: 6px; align-items: center; font-size: 11px; color: var(--muted); margin-top: 2px; }
  .tag { display: inline-block; padding: 1px 6px; border-radius: 10px; font-size: 11px; font-weight: 500; }
  .tag.ok { background: rgba(43,191,124,.15); color: var(--good); }
  .tag.warn { background: rgba(240,162,62,.15); color: var(--warn); }
  .tag.bad { background: rgba(239,68,68,.15); color: var(--bad); }
  .tag.muted { background: var(--panel-2); color: var(--muted); }

  #main { overflow-y: auto; padding: 24px 32px 80px; }
  .empty { color: var(--muted); margin-top: 40px; text-align: center; }
  .case-header { border-bottom: 1px solid var(--border); padding-bottom: 12px; margin-bottom: 16px; }
  .case-header .breadcrumb { color: var(--muted); font-size: 12px; }
  .case-header h2 { margin: 6px 0 8px; font-size: 18px; font-weight: 600; line-height: 1.45; }
  .case-header .stats { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; font-size: 12px; }
  .ans-row { display: flex; gap: 24px; margin-top: 10px; padding: 10px 14px; background: var(--panel); border: 1px solid var(--border); border-radius: 8px; }
  .ans-col { flex: 1 1 0; min-width: 0; }
  .ans-col .label { font-size: 11px; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); margin-bottom: 4px; }
  .ans-col .val { font-size: 13px; line-height: 1.5; }

  .step { margin: 14px 0; padding: 12px 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--panel); }
  .step.question { border-left: 3px solid var(--accent); }
  .step.assistant { border-left: 3px solid var(--think); }
  .step.tool_response { border-left: 3px solid var(--tool); background: var(--panel-2); }
  .step.final { border-left: 3px solid var(--answer); }
  .step .role { font-size: 11px; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
  .step .role .badge { color: var(--text); font-weight: 600; }
  .step .role .turn { color: var(--muted); }
  .think { color: #cdd6e0; font-size: 13.5px; line-height: 1.6; white-space: pre-wrap; }
  .tool-call { margin-top: 10px; padding: 8px 10px; border-radius: 6px; background: var(--panel-2); border: 1px solid var(--border); font-size: 13px; }
  .tool-call .tc-head { display: flex; align-items: center; gap: 8px; font-size: 12px; margin-bottom: 6px; }
  .tool-call.search .tc-head .badge { color: var(--search); }
  .tool-call.visit .tc-head .badge { color: var(--visit); }
  .tool-call .queries { display: flex; flex-direction: column; gap: 4px; }
  .tool-call .queries .q { padding: 4px 8px; background: rgba(43,191,124,.08); border: 1px solid rgba(43,191,124,.25); border-radius: 4px; color: #aef0c8; font-family: ui-monospace, monospace; font-size: 12.5px; }
  .tool-call .urls { display: flex; flex-direction: column; gap: 4px; }
  .tool-call .urls .u { padding: 4px 8px; background: rgba(240,162,62,.08); border: 1px solid rgba(240,162,62,.25); border-radius: 4px; word-break: break-all; font-size: 12.5px; }
  .tool-call .urls .u a { color: #ffd9a0; }
  .tool-call .goal { margin-top: 4px; color: var(--muted); font-size: 12px; font-style: italic; }
  .tool-resp-body { max-height: 200px; overflow: hidden; position: relative; transition: max-height .2s; }
  .tool-resp-body.expanded { max-height: 9999px; }
  .tool-resp-body::after { content: ""; position: absolute; left: 0; right: 0; bottom: 0; height: 50px;
    background: linear-gradient(to bottom, rgba(29,34,44,0), var(--panel-2)); pointer-events: none; transition: opacity .2s; }
  .tool-resp-body.expanded::after { opacity: 0; }
  .toggle { margin-top: 6px; background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 3px 10px; border-radius: 4px; cursor: pointer; font-size: 11px; }
  .toggle:hover { color: var(--text); background: var(--panel); }
  .tool-resp-body pre { font-size: 12px; color: #c8d2e0; line-height: 1.5; }
  .answer-box { margin-top: 10px; padding: 10px 12px; border-radius: 6px; border: 1px solid rgba(192,132,252,.3); background: rgba(192,132,252,.06); color: #e9d5ff; font-size: 13.5px; line-height: 1.55; }
  .answer-box .label { font-size: 11px; text-transform: uppercase; letter-spacing: .06em; color: #c084fc; margin-bottom: 6px; }
  .answer-box .md p { margin: 0 0 8px; }
  .answer-box .md p:last-child { margin-bottom: 0; }
  .answer-box .md h1, .answer-box .md h2, .answer-box .md h3 {
    margin: 10px 0 8px;
    color: #f2e8ff;
    line-height: 1.35;
  }
  .answer-box .md h1 { font-size: 1.02rem; }
  .answer-box .md h2 { font-size: 0.98rem; }
  .answer-box .md h3 { font-size: 0.94rem; }
  .answer-box .md ul, .answer-box .md ol { margin: 6px 0 10px 18px; }
  .answer-box .md li { margin: 4px 0; }
  .answer-box .md a { color: #d8b4fe; text-decoration: underline; }
  .answer-box .md code {
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    background: rgba(15,23,42,.5);
    border: 1px solid rgba(148,163,184,.25);
    border-radius: 4px;
    padding: 1px 5px;
    color: #f5d0fe;
  }
  .answer-box .md pre {
    margin: 8px 0;
    padding: 10px;
    background: rgba(15,23,42,.65);
    border: 1px solid rgba(148,163,184,.25);
    border-radius: 6px;
    overflow-x: auto;
  }
  .answer-box .md pre code {
    background: transparent;
    border: 0;
    padding: 0;
    color: #e2e8f0;
  }

  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: #2a313d; border-radius: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
</style>
</head>
<body>
<div id="app">
  <aside id="sidebar">
    <div style="margin:0 0 12px;padding:8px 8px 10px;border-bottom:1px solid var(--border);">
      <a href="../" style="color:var(--muted);font-size:12px;text-decoration:none;">← LiteResearcher</a>
      <div style="color:var(--text);font-size:13px;font-weight:600;margin-top:4px;">Trajectory Cases</div>
      <div style="color:var(--muted);font-size:11px;margin-top:2px;line-height:1.4;">15 audited rollouts · 8 benchmarks<br/>LiteResearcher-4B</div>
    </div>
    <h1>Benchmarks</h1><div id="bench-list">loading…</div>
  </aside>
  <main id="main"><div class="empty">从左侧挑一个 case 看看 ✨</div></main>
</div>
<script src="viewer.js?v=20260522c"></script>
</body>
</html>
