hydra:
  searchpath:
    - file://verl/trainer/config

defaults:
  - ppo_trainer
  - _self_

data:
  max_prompt_length: 4096
  max_response_length: 3000
  train_batch_size: 256
  return_raw_chat: True
  shuffle: False

actor_rollout_ref:
  hybrid_engine: True
  rollout:
    name: sglang_async
    multi_turn:
      enable: True
      max_assistant_turns: 10  # 修复：max_turns → max_assistant_turns
      format: qwen
      tool_config_path: examples/sglang_multiturn/config/tool_config/search_browse_tool_config.yaml